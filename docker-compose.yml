version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-case_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai_service
    restart: always
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      NODE_ENV: production

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-case_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5001
      NODE_ENV: development
      AI_SERVICE_URL: http://ai-service:5002
    depends_on:
      - db
      - redis
      - ai-service
    command: sh -c "npx prisma migrate deploy && npm run dev"
    volumes:
      - ./backend/uploads:/app/uploads

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:

